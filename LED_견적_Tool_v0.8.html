<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LED 사이니지 견적 산출</title>
<style>
  :root {
    --blue-dark:#1565C0;--blue:#1E88E5;--blue-light:#E3F2FD;
    --green-dark:#2E7D32;--green:#43A047;--green-light:#E8F5E9;
    --orange-dark:#E65100;--orange:#FB8C00;--orange-light:#FFF3E0;
    --gray:#666;--line:#ddd;--bg:#f9f9f9;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Malgun Gothic',sans-serif;font-size:13px;background:#f0f4f8;color:#333;}
  h1{background:var(--blue-dark);color:#fff;padding:14px 20px;font-size:17px;}
  h1 span{font-size:12px;opacity:.75;margin-left:8px;}
  .wrap{display:flex;gap:12px;padding:12px;}
  /* ── LEFT PANEL ── */
  .left{width:340px;flex-shrink:0;display:flex;flex-direction:column;gap:10px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:6px;padding:12px;}
  .card h2{font-size:13px;font-weight:700;color:var(--blue-dark);border-bottom:2px solid var(--blue-light);padding-bottom:6px;margin-bottom:10px;}
  /* grids */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;align-items:center;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px 8px;align-items:center;}
  label{font-size:12px;color:var(--gray);}
  input[type=number],select{width:100%;padding:5px 7px;border:1px solid #ccc;border-radius:4px;font-size:13px;}
  input[type=number]:focus,select:focus{outline:none;border-color:var(--blue);}
  /* toggle */
  .toggle-group{display:flex;gap:5px;flex-wrap:wrap;}
  .toggle-btn{padding:4px 9px;border:1px solid #bbb;border-radius:4px;background:#fff;cursor:pointer;font-size:12px;}
  .toggle-btn.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue-dark);font-weight:600;}
  .toggle-btn.active-orange{border-color:#FF9800;background:#FFF3E0;color:#E65100;}
  /* sliders */
  .slider-row{display:grid;grid-template-columns:auto 1fr auto;gap:6px;align-items:center;margin-top:4px;}
  .slider-row label{font-size:12px;color:var(--gray);white-space:nowrap;}
  input[type=range]{width:100%;accent-color:var(--blue);}
  .slider-val{font-weight:700;color:var(--blue-dark);font-size:13px;min-width:36px;text-align:right;}
  /* ── RIGHT PANEL ── */
  .right{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px;}
  /* summary bar */
  .summary{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .sum-box{background:#fff;border:1px solid var(--line);border-radius:6px;padding:10px 12px;text-align:center;}
  .sum-box .lbl{font-size:11px;color:var(--gray);}
  .sum-box .val{font-size:17px;font-weight:700;color:var(--blue-dark);margin-top:3px;}
  .sum-box.hl{border-color:var(--blue);background:var(--blue-light);}
  .sum-box.hl .val{color:var(--blue-dark);}
  /* tables */
  .tbl-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{background:var(--blue-dark);color:#fff;padding:6px 8px;text-align:center;white-space:nowrap;}
  td{padding:5px 8px;border-bottom:1px solid #eee;text-align:right;white-space:nowrap;}
  td:first-child{text-align:left;}
  tr:nth-child(even) td{background:#fafafa;}
  tr:hover td{background:#e8f0fe;}
  .sub-hd td{background:#e3f2fd;font-weight:700;color:var(--blue-dark);font-size:11px;}
  .total-row td{background:#1565C0;color:#fff;font-weight:700;font-size:13px;}
  /* cost breakdown */
  .cost-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .cost-box{border:1px solid var(--line);border-radius:5px;padding:9px 11px;}
  .cost-box .c-lbl{font-size:11px;color:var(--gray);margin-bottom:4px;}
  .cost-box .c-val{font-size:14px;font-weight:700;}
  .cost-box.blue .c-val{color:var(--blue-dark);}
  .cost-box.green .c-val{color:var(--green-dark);}
  .cost-box.orange .c-val{color:var(--orange-dark);}
  /* note */
  .note{font-size:11px;color:#888;margin-top:4px;line-height:1.6;}
  /* buttons */
  .btn{padding:8px 16px;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:600;}
  .btn-blue{background:var(--blue-dark);color:#fff;}
  .btn-blue:hover{background:#0d47a1;}
  .btn-green{background:var(--green-dark);color:#fff;}
  .btn-green:hover{background:#1b5e20;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  /* pixel pitch section */
  #pp-section{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);}
  #pp-section.hidden{display:none;}
  .color-swatch{display:inline-block;width:12px;height:12px;border-radius:2px;margin-right:4px;vertical-align:middle;border:1px solid #bbb;}
  /* responsive */
  @media(max-width:900px){
    .wrap{flex-direction:column;}
    .left{width:100%;}
    .summary{grid-template-columns:repeat(3,1fr);}
  }
</style>
</head>
<body>
<h1>LED 사이니지 견적 산출 <span>v0.8</span></h1>
<div class="wrap">

<!-- ═══════════════ LEFT PANEL ═══════════════ -->
<div class="left">

  <!-- 제품 선택 -->
  <div class="card">
    <h2>제품 선택</h2>
    <div class="grid2">
      <label>제품 카테고리</label>
      <select id="cat" onchange="onCatChange()">
        <option value="indoor">실내용 (Indoor)</option>
        <option value="outdoor">실외용 (Outdoor)</option>
        <option value="floor">바닥용 (Floor)</option>
        <option value="transparent">투명 (Transparent)</option>
        <option value="flex">플렉시블 (Flexible)</option>
        <option value="poster">포스터 (Poster LED)</option>
      </select>

      <label>픽셀 피치 (mm)</label>
      <select id="pp" onchange="calc()">
        <!-- 옵션은 JS로 채움 -->
      </select>
    </div>
    <!-- 픽셀피치 상세 -->
    <div id="pp-section">
      <div class="grid2" id="pp-detail"></div>
    </div>
  </div>

  <!-- 화면 크기 -->
  <div class="card">
    <h2>화면 크기 설정</h2>
    <div class="grid2">
      <label>가로 (W) mm</label>
      <input type="number" id="W" value="3000" min="100" step="1" oninput="calc()">
      <label>세로 (H) mm</label>
      <input type="number" id="H" value="2000" min="100" step="1" oninput="calc()">
    </div>
    <div style="margin-top:8px">
      <label style="font-size:12px;color:var(--gray)">캐비닛 배열</label>
      <div id="cab-layout" style="margin-top:4px;font-size:13px;font-weight:600;color:var(--blue-dark);">-</div>
    </div>
  </div>

  <!-- 설치 환경 -->
  <div class="card">
    <h2>설치 환경</h2>
    <div class="grid2">
      <label>설치 형태</label>
      <div class="toggle-group" id="tg-install">
        <button class="toggle-btn active" onclick="setToggle('tg-install',this,'wall');calc()">벽부</button>
        <button class="toggle-btn" onclick="setToggle('tg-install',this,'stand');calc()">스탠드</button>
        <button class="toggle-btn" onclick="setToggle('tg-install',this,'ceiling');calc()">천장</button>
        <button class="toggle-btn" onclick="setToggle('tg-install',this,'column');calc()">기둥</button>
      </div>
      <label>층수</label>
      <select id="floor" onchange="calc()">
        <option value="1">1층 (기본)</option>
        <option value="2">2~5층 (+10%)</option>
        <option value="3">6층 이상 (+20%)</option>
      </select>
    </div>
  </div>

  <!-- 부가 옵션 -->
  <div class="card">
    <h2>부가 옵션</h2>
    <div class="grid2">
      <label>마진율 (%)</label>
      <input type="number" id="margin" value="20" min="0" max="60" step="1" oninput="calc()">
      <label>설치 노무비</label>
      <div class="toggle-group" id="tg-labor">
        <button class="toggle-btn active" onclick="setToggle('tg-labor',this,'include');calc()">포함</button>
        <button class="toggle-btn" onclick="setToggle('tg-labor',this,'exclude');calc()">제외</button>
      </div>
      <label>전기 공사비</label>
      <div class="toggle-group" id="tg-elec">
        <button class="toggle-btn active" onclick="setToggle('tg-elec',this,'include');calc()">포함</button>
        <button class="toggle-btn" onclick="setToggle('tg-elec',this,'exclude');calc()">제외</button>
      </div>
      <label>운반비</label>
      <div class="toggle-group" id="tg-transport">
        <button class="toggle-btn active" onclick="setToggle('tg-transport',this,'include');calc()">포함</button>
        <button class="toggle-btn" onclick="setToggle('tg-transport',this,'exclude');calc()">제외</button>
      </div>
    </div>
    <!-- 밝기 / 소비전력 슬라이더 -->
    <div class="slider-row" style="margin-top:10px">
      <label>밝기</label>
      <input type="range" id="sl-bright" min="0" max="2" step="1" value="1" oninput="calc()">
      <span class="slider-val" id="lbl-bright">표준</span>
    </div>
    <div class="slider-row">
      <label>가동률</label>
      <input type="range" id="sl-op" min="6" max="24" step="1" value="12" oninput="calc()">
      <span class="slider-val" id="lbl-op">12h</span>
    </div>
  </div>

  <!-- 버튼 -->
  <div class="btn-row">
    <button class="btn btn-blue" onclick="calc()">재계산</button>
    <button class="btn btn-green" onclick="exportExcel()">엑셀 다운로드</button>
  </div>

</div><!-- /left -->

<!-- ═══════════════ RIGHT PANEL ═══════════════ -->
<div class="right">

  <!-- 요약 바 -->
  <div class="summary">
    <div class="sum-box">
      <div class="lbl">화면 크기</div>
      <div class="val" id="r-size">-</div>
    </div>
    <div class="sum-box">
      <div class="lbl">면적</div>
      <div class="val" id="r-area">-</div>
    </div>
    <div class="sum-box">
      <div class="lbl">캐비닛 수</div>
      <div class="val" id="r-cab">-</div>
    </div>
    <div class="sum-box">
      <div class="lbl">공급가 (VAT 별도)</div>
      <div class="val" id="r-supply">-</div>
    </div>
    <div class="sum-box hl">
      <div class="lbl">최종 견적 (VAT 포함)</div>
      <div class="val" id="r-total">-</div>
    </div>
  </div>

  <!-- 캐비닛 상세 -->
  <div class="card">
    <h2>캐비닛 구성 상세</h2>
    <div class="tbl-wrap">
      <table id="tbl-main">
        <thead>
          <tr>
            <th>항목</th><th>규격</th><th>수량</th>
            <th>단가(원)</th><th>공급가(원)</th>
          </tr>
        </thead>
        <tbody id="tbody-main"></tbody>
      </table>
    </div>
  </div>

  <!-- 비용 분류 -->
  <div class="card">
    <h2>비용 구성 요약</h2>
    <div class="cost-grid">
      <div class="cost-box blue"><div class="c-lbl">제품비 (원가)</div><div class="c-val" id="c-prod">-</div></div>
      <div class="cost-box green"><div class="c-lbl">설치/운반비</div><div class="c-val" id="c-inst">-</div></div>
      <div class="cost-box orange"><div class="c-lbl">마진 금액</div><div class="c-val" id="c-margin">-</div></div>
    </div>
    <div class="note" id="install-note"></div>
  </div>

  <!-- 연간 운영비 -->
  <div class="card">
    <h2>연간 운영비 추정</h2>
    <div class="tbl-wrap">
      <table id="tbl-op">
        <thead><tr><th>항목</th><th>계산 기준</th><th>연간 비용(원)</th></tr></thead>
        <tbody id="tbody-op"></tbody>
      </table>
    </div>
  </div>

</div><!-- /right -->
</div><!-- /wrap -->

<script>
/* ═══════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════ */
const PRODUCTS = {
  indoor:{
    name:'실내용',
    pitches:{
      'P1.2':{w:600,h:337,price:2200000,power:200},
      'P1.5':{w:600,h:337,price:1600000,power:200},
      'P1.8':{w:600,h:337,price:1200000,power:180},
      'P2.0':{w:600,h:337,price:950000, power:180},
      'P2.5':{w:600,h:337,price:700000, power:160},
      'P3.0':{w:600,h:337,price:520000, power:150},
      'P4.0':{w:600,h:337,price:380000, power:130},
    },
    bright:{low:800,std:1000,high:1500},
  },
  outdoor:{
    name:'실외용',
    pitches:{
      'P4.0':{w:960,h:960,price:980000, power:600},
      'P5.0':{w:960,h:960,price:780000, power:550},
      'P6.0':{w:960,h:960,price:620000, power:500},
      'P8.0':{w:960,h:960,price:480000, power:450},
      'P10.0':{w:960,h:960,price:360000,power:400},
    },
    bright:{low:3000,std:5000,high:8000},
  },
  floor:{
    name:'바닥용',
    pitches:{
      'P3.9':{w:500,h:500,price:850000, power:250},
      'P4.8':{w:500,h:500,price:680000, power:230},
      'P6.25':{w:500,h:500,price:520000,power:210},
    },
    bright:{low:600,std:800,high:1200},
  },
  transparent:{
    name:'투명',
    pitches:{
      'P3.9':{w:1000,h:500,price:1200000,power:150},
      'P7.8':{w:1000,h:500,price:850000, power:130},
      'P10.4':{w:1000,h:500,price:620000,power:120},
    },
    bright:{low:1500,std:2500,high:4000},
  },
  flex:{
    name:'플렉시블',
    pitches:{
      'P2.5':{w:500,h:500,price:950000, power:200},
      'P3.0':{w:500,h:500,price:750000, power:180},
      'P4.0':{w:500,h:500,price:580000, power:160},
    },
    bright:{low:800,std:1200,high:1800},
  },
  poster:{
    name:'포스터 LED',
    pitches:{
      'P1.8':{w:480,h:1080,price:1800000,power:200},
      'P2.0':{w:480,h:1080,price:1400000,power:190},
      'P2.5':{w:480,h:1080,price:1100000,power:170},
    },
    bright:{low:600,std:1000,high:1500},
  },
};

// 설치 노무비 단가 (원/㎡)
const INSTALL_RATES = {
  wall:    {1:120000, 2:132000, 3:144000},
  stand:   {1:90000,  2:99000,  3:108000},
  ceiling: {1:160000, 2:176000, 3:192000},
  column:  {1:140000, 2:154000, 3:168000},
};

/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
const fmtN = n => Math.round(n).toLocaleString();
const fmtW = n => n>=10000 ? (n/10000).toFixed(1)+'만W' : n+'W';

function setToggle(groupId, btn, val){
  document.querySelectorAll(`#${groupId} .toggle-btn`).forEach(b=>b.classList.remove('active','active-orange'));
  btn.classList.add(val==='exclude' ? 'active-orange' : 'active');
  btn.dataset.val = val;
}
function getToggle(groupId){
  const b = document.querySelector(`#${groupId} .toggle-btn.active, #${groupId} .toggle-btn.active-orange`);
  return b ? b.dataset.val || b.textContent.trim() : null;
}

/* 카테고리 변경 → 픽셀피치 옵션 갱신 */
function onCatChange(){
  const cat = document.getElementById('cat').value;
  const prod = PRODUCTS[cat];
  const sel  = document.getElementById('pp');
  sel.innerHTML = Object.keys(prod.pitches).map(k=>`<option value="${k}">${k}</option>`).join('');
  calc();
}

/* ═══════════════════════════════════════════════════
   MAIN CALC
═══════════════════════════════════════════════════ */
function calc(){
  const cat   = document.getElementById('cat').value;
  const ppKey = document.getElementById('pp').value;
  const prod  = PRODUCTS[cat];
  const pit   = prod.pitches[ppKey];
  if(!pit) return;

  const W = +document.getElementById('W').value || 3000;
  const H = +document.getElementById('H').value || 2000;

  // 캐비닛 수
  const cabW = Math.ceil(W / pit.w);
  const cabH = Math.ceil(H / pit.h);
  const totalCab = cabW * cabH;

  // 실제 화면 크기 (mm)
  const realW = cabW * pit.w;
  const realH = cabH * pit.h;

  // 면적 (㎡)
  const areaPer   = (pit.w / 1000) * (pit.h / 1000);
  const totalArea = Math.round(totalCab * areaPer * 1000) / 1000;

  // 밝기 레벨
  const bLvl   = +document.getElementById('sl-bright').value; // 0,1,2
  const bLabel = ['저밝기','표준','고밝기'][bLvl];
  const bKeys  = ['low','std','high'];
  document.getElementById('lbl-bright').textContent = bLabel;

  // 가동 시간
  const opH = +document.getElementById('sl-op').value;
  document.getElementById('lbl-op').textContent = opH+'h';

  // 설치 환경
  const installType = getToggle('tg-install') || 'wall';
  const floorLvl    = +document.getElementById('floor').value;
  const installRate = INSTALL_RATES[installType][floorLvl];

  // 옵션 포함 여부
  const inclLabor     = getToggle('tg-labor') === 'include';
  const inclElec      = getToggle('tg-elec')  === 'include';
  const inclTransport = getToggle('tg-transport') === 'include';
  const marginPct     = +document.getElementById('margin').value / 100;

  // --- 단가 계산 ---
  const unitPrice = pit.price;
  const prodCost  = unitPrice * totalCab;          // 제품 원가 합계

  // 설치 노무비
  const j8  = totalArea * installRate;             // 순수 노무비
  const laborCost = inclLabor ? j8 : 0;

  // 전기 공사비 (면적 기준 30,000원/㎡ 고정)
  const elecCost = inclElec ? Math.round(totalArea * 30000) : 0;

  // 운반비 (캐비닛 수 × 3,000원, 최소 50,000원)
  const transportCost = inclTransport ? Math.max(totalCab * 3000, 50000) : 0;

  const instTotal = laborCost + elecCost + transportCost;
  const baseCost  = prodCost + instTotal;           // 마진 전 합계
  const marginAmt = Math.round(baseCost * marginPct);
  const supply    = baseCost + marginAmt;           // 공급가 (VAT 별도)
  const total     = Math.round(supply * 1.1);       // VAT 포함

  // ── 픽셀피치 상세 표시 ──
  const ppSec  = document.getElementById('pp-section');
  const ppDet  = document.getElementById('pp-detail');
  const bright = prod.bright[bKeys[bLvl]];
  ppSec.classList.remove('hidden');
  ppDet.innerHTML = `
    <label>캐비닛 크기</label><span>${pit.w}×${pit.h} mm</span>
    <label>소비전력</label><span>${pit.power} W/㎡</span>
    <label>밝기</label><span>${bright.toLocaleString()} nit</span>
    <label>단가/EA</label><span>${fmtN(unitPrice)} 원</span>
  `;

  // ── 요약 바 ──
  document.getElementById('r-size').textContent    = `${(realW/1000).toFixed(2)}×${(realH/1000).toFixed(2)} m`;
  document.getElementById('r-area').textContent       = `${(Math.floor(totalArea*100)/100).toFixed(2)} ㎡`;
  document.getElementById('r-cab').textContent     = `${totalCab} EA (${cabW}×${cabH})`;
  document.getElementById('r-supply').textContent  = fmtN(supply)+' 원';
  document.getElementById('r-total').textContent   = fmtN(total)+' 원';
  document.getElementById('cab-layout').textContent= `${cabW}열 × ${cabH}행 = ${totalCab} EA`;

  // ── 비용 구성 ──
  document.getElementById('c-prod').textContent   = fmtN(prodCost)+' 원';
  document.getElementById('c-inst').textContent   = fmtN(instTotal)+' 원';
  document.getElementById('c-margin').textContent = fmtN(marginAmt)+' 원';

  const rateLabel = ['벽부','스탠드','천장','기둥'].find((_,i)=>['wall','stand','ceiling','column'][i]===installType);
  document.getElementById('install-note').textContent
    = `${(Math.floor(totalArea*100)/100).toFixed(2)}㎡ × ${fmtN(installRate)}원 (${rateLabel}) = 설치 노무비 ${fmtN(j8)}원`
    + (inclElec ? ` | 전기공사 ${fmtN(elecCost)}원` : '')
    + (inclTransport ? ` | 운반 ${fmtN(transportCost)}원` : '');

  // ── 캐비닛 상세 테이블 ──
  const tbody = document.getElementById('tbody-main');
  tbody.innerHTML = '';
  function row(name, spec, qty, up, amt, cls=''){
    return `<tr class="${cls}"><td>${name}</td><td>${spec}</td><td style="text-align:center">${qty}</td><td>${fmtN(up)}</td><td>${fmtN(amt)}</td></tr>`;
  }

  tbody.innerHTML += `<tr class="sub-hd"><td colspan="5">▶ 제품비</td></tr>`;
  tbody.innerHTML += row(
    `LED 캐비닛 (${ppKey})`,
    `${pit.w}×${pit.h}mm / ${bright.toLocaleString()}nit`,
    totalCab,
    unitPrice, prodCost
  );

  if(instTotal>0){
    tbody.innerHTML += `<tr class="sub-hd"><td colspan="5">▶ 설치/부대비</td></tr>`;
    if(inclLabor)    tbody.innerHTML += row('설치 노무비', `${(Math.floor(totalArea*100)/100).toFixed(2)}㎡ × ${fmtN(installRate)}원`, 1, j8, j8);
    if(inclElec)     tbody.innerHTML += row('전기 공사비', '30,000원/㎡', 1, elecCost, elecCost);
    if(inclTransport)tbody.innerHTML += row('운반비', `${totalCab}EA × 3,000원`, 1, transportCost, transportCost);
  }

  tbody.innerHTML += `<tr class="sub-hd"><td colspan="5">▶ 마진</td></tr>`;
  tbody.innerHTML += row('마진', `${(marginPct*100).toFixed(0)}%`, 1, marginAmt, marginAmt);

  tbody.innerHTML += `<tr class="total-row">
    <td colspan="3">합 계 (공급가 / VAT 별도)</td>
    <td></td><td>${fmtN(supply)}</td></tr>`;
  tbody.innerHTML += `<tr class="total-row" style="background:#0d47a1">
    <td colspan="3">최종 견적 (VAT 10% 포함)</td>
    <td></td><td>${fmtN(total)}</td></tr>`;

  // ── 연간 운영비 ──
  const wattTot  = pit.power * totalArea;  // W
  const kwhDay   = wattTot * opH / 1000;
  const kwhYear  = kwhDay * 365;
  const elecYear = Math.round(kwhYear * 120); // 120원/kWh
  const maintYear= Math.round(supply * 0.03); // 공급가 3%

  const tobodyOp = document.getElementById('tbody-op');
  tobodyOp.innerHTML = `
    <tr><td>전력 소비</td><td>${fmtW(wattTot)} × ${opH}h × 365일</td><td>${fmtN(elecYear)}</td></tr>
    <tr><td>유지보수 (3%)</td><td>공급가 × 3%</td><td>${fmtN(maintYear)}</td></tr>
    <tr class="total-row"><td colspan="2">연간 운영비 합계</td><td>${fmtN(elecYear+maintYear)}</td></tr>
  `;

  // 전역 저장 (엑셀용)
  window._led = {
    cat, ppKey, W, H,
    cabW, cabH, totalCab, realW, realH, totalArea,
    bright, bLabel,
    unitPrice, prodCost,
    installType, floorLvl, installRate, j8,
    inclLabor, inclElec, inclTransport,
    laborCost, elecCost, transportCost, instTotal,
    marginPct, marginAmt, supply, total,
    opH, wattTot, kwhYear, elecYear, maintYear
  };
}

function exportExcel(){
  if(!window._led){ alert('먼저 계산을 실행하세요.'); return; }
  const d = window._led;

  // ── 1. 템플릿 디코딩 ──
  const bin = atob(EXCEL_TEMPLATE_B64);
  const buf = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);

  // ── 2. ZIP 파싱 ──
  function parseZip(ab){
    const v = new DataView(ab), u = new Uint8Array(ab);
    const entries={};
    let i=0;
    while(i<u.length-4){
      if(v.getUint32(i,true)===0x04034b50){
        const fnLen=v.getUint16(i+26,true), exLen=v.getUint16(i+28,true);
        const compSz=v.getUint32(i+18,true), method=v.getUint16(i+8,true);
        const fn=new TextDecoder().decode(u.slice(i+30,i+30+fnLen));
        const dataStart=i+30+fnLen+exLen;
        const raw=u.slice(dataStart,dataStart+compSz);
        entries[fn]={raw,method,compSz,offset:dataStart};
        i=dataStart+compSz;
      } else i++;
    }
    return entries;
  }

  // ── 3. inflate (stored) ──
  function getXml(entry){
    if(entry.method===0) return new TextDecoder('utf-8').decode(entry.raw);
    // method=8: deflate — use DecompressionStream if available
    return null;
  }

  // ── 4. xlsx 재조립 (간이) ──
  // 실제 구현: 공유문자열/시트 XML 수정 후 ZIP 재조립
  // 여기서는 CSV fallback 으로 완전한 데이터 제공
  exportCsv(d);
}

/* CSV fallback (xlsx 구현 전 임시) */
function exportCsv(d){
  const fmtN2 = n=>Math.round(n).toLocaleString('ko-KR');
  const today = new Date().toLocaleDateString('ko-KR');
  const cat_name = {indoor:'실내용',outdoor:'실외용',floor:'바닥용',transparent:'투명',flex:'플렉시블',poster:'포스터 LED'}[d.cat]||d.cat;
  const install_name = {wall:'벽부',stand:'스탠드',ceiling:'천장',column:'기둥'}[d.installType]||d.installType;

  /* ── 완전한 견적 데이터를 xlsx-like CSV로 ── */
  const rows=[
    ['LED 사이니지 견적서','','','',''],
    ['작성일',today,'','',''],
    ['','','','',''],
    ['▶ 제품 사양','','','',''],
    ['카테고리',cat_name,'픽셀피치',d.ppKey,''],
    ['요청 크기(mm)',`${d.W} × ${d.H}`,'실제 크기(mm)',`${d.realW} × ${d.realH}`,''],
    ['캐비닛 배열',`${d.cabW}열 × ${d.cabH}행`,'캐비닛 수(EA)',d.totalCab,''],
    ['설치 면적(㎡)',d.totalArea,'밝기',`${d.bright.toLocaleString()} nit (${d.bLabel})`,''],
    ['설치 형태',install_name,'층수 할증',['기본(1층)','2~5층(+10%)','6층이상(+20%)'][d.floorLvl-1],''],
    ['','','','',''],
    ['▶ 비용 내역','항목','수량','단가(원)','금액(원)'],
    ['제품비','LED 캐비닛',d.totalCab,d.unitPrice,d.prodCost],
  ];
  if(d.inclLabor)    rows.push(['설치비','노무비',1,d.j8,d.laborCost]);
  if(d.inclElec)     rows.push(['전기공사비','전기공사',1,d.elecCost,d.elecCost]);
  if(d.inclTransport)rows.push(['운반비','운반',1,d.transportCost,d.transportCost]);
  rows.push(['마진',`${(d.marginPct*100).toFixed(0)}%`,1,d.marginAmt,d.marginAmt]);
  rows.push(['','','','','']);
  rows.push(['공급가(VAT별도)','','','',d.supply]);
  rows.push(['부가세(10%)','','','',Math.round(d.supply*0.1)]);
  rows.push(['최종 견적(VAT포함)','','','',d.total]);
  rows.push(['','','','','']);
  rows.push(['▶ 연간 운영비','','','','']);
  rows.push(['전력소비(연간kWh)',d.kwhYear.toFixed(1),'전기료(원)',d.elecYear,'']);
  rows.push(['유지보수(연간원)',d.maintYear,'','','']);
  rows.push(['연간 운영비 합계','','','',d.elecYear+d.maintYear]);

  const csv = rows.map(r=>r.map(c=>{
    const s=String(c===null||c===undefined?'':c);
    return s.includes(',')||s.includes('"')||s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\n');

  const bom = '﻿';
  const blob = new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const fileName = `LED견적_${d.ppKey}_${d.W}x${d.H}_${new Date().toISOString().slice(0,10)}.csv`;
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
